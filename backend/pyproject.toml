[tool.ruff]
line-length = 110
target-version = "py312"

[tool.ruff.lint]
# Permissive baseline: catch real problems (unused imports/vars, bare
# excepts, undefined names) without a retroactive style rewrite of
# everything already built. Widen this list deliberately over time,
# not by accident.
select = ["E", "F", "W"]
ignore = [
    "E501", # line length is a formatter concern, not a lint gate here
]
