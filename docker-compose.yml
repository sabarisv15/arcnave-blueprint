services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-arcnave_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-arcnave}
      ARCNAVE_APP_PASSWORD: ${ARCNAVE_APP_PASSWORD:?set ARCNAVE_APP_PASSWORD in .env}
      ARCNAVE_PLATFORM_PASSWORD: ${ARCNAVE_PLATFORM_PASSWORD:?set ARCNAVE_PLATFORM_PASSWORD in .env}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-arcnave_admin} -d ${POSTGRES_DB:-arcnave}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: ./backend
    environment:
      APP_NAME: ARCNAVE
      ENVIRONMENT: development
      LOG_LEVEL: INFO
      # Runtime role — least privilege, subject to RLS. See
      # docker/postgres/init/01-app-role.sh.
      DATABASE_URL: postgresql+psycopg://arcnave_app:${ARCNAVE_APP_PASSWORD}@db:5432/${POSTGRES_DB:-arcnave}
      # Migration role — owns the tables, used only by Alembic, never
      # by the running app.
      ALEMBIC_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-arcnave_admin}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-arcnave}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?set JWT_SECRET_KEY in .env}
      # Platform role — least privilege, granted only on
      # platform_admins/colleges. See docker/postgres/init/02-platform-role.sh.
      PLATFORM_DATABASE_URL: postgresql+psycopg://arcnave_platform:${ARCNAVE_PLATFORM_PASSWORD}@db:5432/${POSTGRES_DB:-arcnave}
      PLATFORM_JWT_SECRET_KEY: ${PLATFORM_JWT_SECRET_KEY:?set PLATFORM_JWT_SECRET_KEY in .env}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
