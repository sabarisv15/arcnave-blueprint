services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-arcnave_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-arcnave}
      ARCNAVE_APP_PASSWORD: ${ARCNAVE_APP_PASSWORD:?set ARCNAVE_APP_PASSWORD in .env}
      ARCNAVE_PLATFORM_PASSWORD: ${ARCNAVE_PLATFORM_PASSWORD:?set ARCNAVE_PLATFORM_PASSWORD in .env}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-arcnave_admin} -d ${POSTGRES_DB:-arcnave}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: ./backend
    environment:
      APP_NAME: ARCNAVE
      ENVIRONMENT: development
      LOG_LEVEL: info
      # Runtime role — least privilege, subject to RLS. See
      # docker/postgres/init/01-app-role.sh and ADR-015. Same
      # three-role separation as the Python backend had; only the
      # driver-specific connection string scheme changed
      # (postgresql+psycopg:// -> postgresql://, since node-postgres
      # needs no dialect suffix).
      DATABASE_URL: postgresql://arcnave_app:${ARCNAVE_APP_PASSWORD}@db:5432/${POSTGRES_DB:-arcnave}
      # Migration role — owns the tables. Used only by
      # backend/scripts/migrate.js (node-pg-migrate) and by tests that
      # seed/verify fixture data directly, never by application
      # routes. Renamed from ALEMBIC_DATABASE_URL — Alembic is gone
      # (ADR-016), and the old name would now be actively misleading.
      MIGRATION_DATABASE_URL: postgresql://${POSTGRES_USER:-arcnave_admin}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-arcnave}
      # Platform role — least privilege, granted only on
      # platform_admins/colleges/principal_invitations. See
      # docker/postgres/init/02-platform-role.sh and ADR-015.
      PLATFORM_DATABASE_URL: postgresql://arcnave_platform:${ARCNAVE_PLATFORM_PASSWORD}@db:5432/${POSTGRES_DB:-arcnave}
      # Signs/verifies tenant access JWTs (HS256). Back in the app's
      # env now that JWT auth is rebuilt (ADR-016) — was removed for
      # the schema/RLS-only scaffolding pass since nothing used it yet.
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?set JWT_SECRET_KEY in .env}
      # Signs/verifies platform-admin access JWTs. Deliberately a
      # DIFFERENT value from JWT_SECRET_KEY — never reuse that one
      # here, or a tenant and a platform token become indistinguishable
      # by signature alone. Back in the app's env now that the Super
      # Admin Portal API is rebuilt (ADR-016).
      PLATFORM_JWT_SECRET_KEY: ${PLATFORM_JWT_SECRET_KEY:?set PLATFORM_JWT_SECRET_KEY in .env}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      # Anonymous volume over node_modules: the bind mount above would
      # otherwise shadow the node_modules installed into the image
      # during `npm install` (the host's backend/ has none), since bind
      # mounts are applied on top of whatever the image already has at
      # that path.
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
