name: CI

# DISABLED — pending a Node/Express rebuild. See ADR-016.
#
# This workflow is the Python/FastAPI-era CI pipeline (pip install,
# ruff, `alembic upgrade head`, pytest against backend/). The Python
# backend/ tree it targeted has been deleted (ADR-016: Express/Node.js
# replaces FastAPI/Python — a productivity call, not a correctness
# one; full reasoning and consequences in the ADR). Every step below
# would now fail immediately (no backend/requirements.txt, no
# backend/tests/) — rather than leave that failing on every push, the
# trigger is disabled outright until a Node backend with real tests
# exists to build a genuine Node CI workflow around. Left in place
# (not deleted) as a reference for the docker/postgres/init role-
# creation-over-TCP pattern, which is still exactly right and will be
# reused as-is: GitHub's bare `services:` Postgres container still
# won't run docker-entrypoint-initdb.d, regardless of language.
on:
  workflow_dispatch: {}

# Original triggers, restore once a Node CI job replaces the steps
# below:
# on:
#   push:
#     branches: [main]
#   pull_request:
#     branches: [main]

env:
  POSTGRES_USER: arcnave_admin
  POSTGRES_PASSWORD: ci_admin_password
  POSTGRES_DB: arcnave
  ARCNAVE_APP_PASSWORD: ci_app_password
  ARCNAVE_PLATFORM_PASSWORD: ci_platform_password
  JWT_SECRET_KEY: ci_jwt_secret_key_not_for_prod_1234567890
  PLATFORM_JWT_SECRET_KEY: ci_platform_jwt_secret_key_not_for_prod_1234567890
  DATABASE_URL: postgresql://arcnave_app:ci_app_password@localhost:5432/arcnave
  ALEMBIC_DATABASE_URL: postgresql://arcnave_admin:ci_admin_password@localhost:5432/arcnave
  PLATFORM_DATABASE_URL: postgresql://arcnave_platform:ci_platform_password@localhost:5432/arcnave

jobs:
  test:
    runs-on: ubuntu-latest
    if: false # belt-and-suspenders: workflow_dispatch above already keeps this off push/PR, but this ensures even a manual run no-ops rather than failing on Python steps that no longer apply.

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U arcnave_admin -d arcnave"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install ruff

      - name: Lint with ruff
        run: ruff check backend

      # A bare `services:` Postgres container is NOT docker-compose —
      # GitHub does not mount docker/postgres/init/*.sh as
      # docker-entrypoint-initdb.d the way docker-compose does. Those
      # scripts must be run explicitly, once the service is reachable,
      # exactly as they'd run on first container boot locally. This
      # part of the pattern carries over unchanged to the Node rebuild.
      - name: Create arcnave_app and arcnave_platform roles
        env:
          PGHOST: localhost
          PGPORT: "5432"
          PGPASSWORD: ${{ env.POSTGRES_PASSWORD }}
        run: |
          bash docker/postgres/init/01-app-role.sh
          bash docker/postgres/init/02-platform-role.sh

      - name: Run migrations
        working-directory: backend
        run: python -m alembic upgrade head

      - name: Run tests
        working-directory: backend
        run: python -m pytest tests/ -v
